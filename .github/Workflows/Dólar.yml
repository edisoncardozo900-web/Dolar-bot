name: Bot Dolar Diario

on:
  schedule:
    - cron: '0 13 * * *'  # 13:00 UTC = 9am Chile
  workflow_dispatch:      # Para correrlo manual

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: python dolar_bot.py
